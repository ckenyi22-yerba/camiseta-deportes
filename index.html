<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Deportivo Interactivo 360</title>
    <!-- Librerías Externas -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Tu archivo CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
            <div class="main-card">
                <!-- Visor 360 -->
                <div class="viewer-container" id="viewer">
                    <div class="badge-counter">
                        <span><i class="bi bi-image me-1"></i> <span id="current-num">1</span> / <span id="total-num">79</span></span>
                        <div class="search-box">
                            <input type="number" id="imgSearch" class="search-input" placeholder="Ir a..." min="1">
                            <i class="bi bi-search" style="cursor: pointer;" onclick="buscarImagen()"></i>
                        </div>
                    </div>

                    <button class="nav-btn prev-btn" onclick="cambiarImagen(-1)">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    
                    <img src="" id="main-img" class="product-img" alt="Producto">
                    
                    <button class="nav-btn next-btn" onclick="cambiarImagen(1)">
                        <i class="bi bi-chevron-right"></i>
                    </button>

                    <div class="position-absolute bottom-0 start-50 translate-middle-x mb-3">
                        <small class="text-muted bg-white px-3 py-1 rounded-pill shadow-sm border">
                            <i class="bi bi-arrow-left-right"></i> Arrastra para girar
                        </small>
                    </div>
                </div>

                <!-- Barra de Miniaturas -->
                <div id="thumbs" class="thumb-container"></div>
            </div>
        </div>
    </div>
</div>

<!-- Sección Pasacalle -->
<div class="container mt-5">
    <hr>
    <div id="lista-nueva" class="mt-4">
        <h3 class="text-success">Pasacalle</h3>
        <div class="d-flex overflow-auto py-2">
            <!-- Ejemplo de item (repetir según necesites) -->
            <div class="me-3 text-center" style="min-width: 150px;">
                <img src="100.jfif" class="img-thumbnail" alt="MUSICOS" style="width: 150px; height: 150px; object-fit: cover;">
                <p class="mt-2 mb-0 fw-bold text-truncate">MUSICOS</p>
            </div>
            <!-- Otros items aquí... -->
        </div>
    </div>
    <p class="text-center mt-3 text-secondary small">Usa el buscador o las flechas para navegar</p>
</div>

<!-- Modal para actualizar JSON -->
<div class="modal fade" id="modalNuevaLista" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Actualizar Galería</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <textarea id="jsonInput" class="form-control" rows="8" placeholder='[{"url": "imagen1.jpg"}]'></textarea>
                <div id="errorMsg" class="text-danger small mt-2 d-none">Formato inválido.</div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary w-100" onclick="cargarNuevaLista()">Actualizar</button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
